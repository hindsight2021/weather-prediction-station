automation:
  - alias: Weather Brain Imminent Severe Weather Notification
    id: weather_brain_imminent_severe_weather_notification
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.weather_brain_imminent_event
        to: severe_weather
      - platform: numeric_state
        entity_id: sensor.weather_brain_imminent_minutes
        below: 61
        above: -1
    condition:
      - condition: template
        value_template: >
          {{ is_state('sensor.weather_brain_imminent_event', 'severe_weather')
             and states('sensor.weather_brain_imminent_minutes') | int(-1) in range(0, 61) }}
    action:
      - service: notify.pushover
        data:
          title: "Weather Brain: Imminent Severe Weather"
          message: "{{ states('sensor.weather_brain_imminent_summary') }}"

  - alias: Weather Brain Submit Feedback
    id: weather_brain_submit_feedback
    mode: single
    trigger:
      - platform: state
        entity_id: input_button.weather_brain_submit_feedback
    action:
      - service: mqtt.publish
        data:
          topic: ha_bridge/feedback/weather_brain
          payload: >
            {
              "label": "{{ states('input_select.weather_brain_feedback_label') }}",
              "notes": "{{ states('input_text.weather_brain_feedback_notes') }}",
              "timestamp": "{{ now().isoformat() }}"
            }
      - service: input_select.select_option
        target:
          entity_id: input_select.weather_brain_feedback_label
        data:
          option: none
      - service: input_text.set_value
        target:
          entity_id: input_text.weather_brain_feedback_notes
        data:
          value: ""
