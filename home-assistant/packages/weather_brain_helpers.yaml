input_select:
  # Per-hazard feedback: each report trains only that hazard's model
  # (accuracy roadmap Phase 1). Pick the hazard, the verdict, and for
  # heat/cold events a severity, then press Submit.
  weather_brain_feedback_hazard:
    name: Weather Brain Feedback Hazard
    options:
      - none
      - storm
      - wind
      - rain
      - heat
      - cold
    initial: none

  weather_brain_feedback_verdict:
    name: Weather Brain Feedback Verdict
    options:
      - none
      - false_alarm
      - missed_event
      - correct_prediction
    initial: none

  weather_brain_feedback_severity:
    name: Weather Brain Feedback Severity
    options:
      - unspecified
      - mild
      - moderate
      - severe
    initial: unspecified

input_text:
  weather_brain_feedback_notes:
    name: Weather Brain Feedback Notes
    max: 255

input_button:
  weather_brain_submit_feedback:
    name: Submit Weather Brain Feedback
