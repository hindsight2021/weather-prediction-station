title: Weather Brain
views:
  - title: Weather Brain Prediction
    path: weather-brain
    icon: mdi:brain
    cards:
      - type: markdown
        title: Local Weather Prediction
        content: >
          Forecast-driven 1-hour and 24-hour risks, calibrated by local station observations.
          Imminent events are surfaced separately from current conditions.
      - type: conditional
        conditions:
          - entity: sensor.weather_brain_imminent_event
            state_not: none
        card:
          type: markdown
          title: Imminent Weather
          content: >
            **{{ states('sensor.weather_brain_imminent_summary') }}**

            ETA: {{ states('sensor.weather_brain_imminent_minutes') }} minutes
      - type: horizontal-stack
        cards:
          - type: entities
            title: Current Prediction
            entities:
              - sensor.weather_brain_alert_level
              - sensor.weather_brain_explanation
              - sensor.weather_brain_confidence
          - type: gauge
            entity: sensor.weather_brain_storm_risk_1h
            name: 1h Storm Risk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 40
              red: 80
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.weather_brain_rain_risk_24h
            name: 24h Rain Risk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 40
              red: 75
          - type: gauge
            entity: sensor.weather_brain_wind_risk_24h
            name: 24h Wind Risk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 40
              red: 75
      - type: history-graph
        title: Weather Brain Risk History
        hours_to_show: 24
        entities:
          - sensor.weather_brain_storm_risk_1h
          - sensor.weather_brain_wind_risk_1h
          - sensor.weather_brain_rain_risk_1h
          - sensor.weather_brain_lightning_risk_1h
          - sensor.weather_brain_storm_risk_24h
          - sensor.weather_brain_rain_risk_24h
          - sensor.weather_brain_wind_risk_24h
      - type: entities
        title: Fine-Tune & Train Models
        entities:
          - input_select.weather_brain_feedback_label
          - input_text.weather_brain_feedback_notes
          - input_button.weather_brain_submit_feedback
