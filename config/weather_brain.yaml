mqtt:
  discovery_prefix: homeassistant
  client_id: kcr-weather-brain
  birth_topic: weather_brain/status
  state_topic: weather_brain/prediction/state
  availability_topic: weather_brain/status

input_topics:
  temperature_c: ha_bridge/atlas/temperature_c
  humidex: ha_bridge/derived/humidex
  wind_chill_c: ha_bridge/derived/wind_chill_c
  humidity_pct: ha_bridge/atlas/humidity_pct
  pressure_hpa: ha_bridge/fredericton/pressure_hpa
  wind_speed_kmh: ha_bridge/atlas/wind_speed_kmh
  wind_gust_kmh: ha_bridge/atlas/wind_gust_kmh
  rain_rate_mm_h: ha_bridge/atlas/rain_rate
  daily_rain_mm: ha_bridge/atlas/rain_total
  local_lightning_distance_km: lightning/local/distance_km
  local_lightning_count_30m: lightning/local/count_30m
  internet_lightning_count_30m: lightning/internet/count_30m
  radar_precip_nearby: radar/nearby/precip
  forecast_precip_probability_1h: ha_bridge/forecast/precip_probability_1h
  forecast_precip_probability_6h: ha_bridge/forecast/precip_probability_6h
  forecast_precip_probability_24h: ha_bridge/forecast/precip_probability_24h
  forecast_precip_mm_1h: ha_bridge/forecast/precip_mm_1h
  forecast_precip_mm_24h: ha_bridge/forecast/precip_mm_24h
  forecast_wind_gust_max_1h: ha_bridge/forecast/wind_gust_max_1h
  forecast_wind_gust_max_24h: ha_bridge/forecast/wind_gust_max_24h
  forecast_next_precip_minutes: ha_bridge/forecast/next_precip_minutes
  forecast_next_severe_minutes: ha_bridge/forecast/next_severe_minutes
  forecast_severe_condition_24h: ha_bridge/forecast/severe_condition_24h
  forecast_source_count: ha_bridge/forecast/source_count
  forecast_temp_min_24h: ha_bridge/forecast/temp_min_24h
  forecast_temp_max_24h: ha_bridge/forecast/temp_max_24h
  forecast_precip_probability_48h: ha_bridge/forecast/precip_probability_48h
  forecast_precip_probability_72h: ha_bridge/forecast/precip_probability_72h
  forecast_wind_gust_max_48h: ha_bridge/forecast/wind_gust_max_48h
  forecast_wind_gust_max_72h: ha_bridge/forecast/wind_gust_max_72h
  forecast_severe_condition_48h: ha_bridge/forecast/severe_condition_48h
  forecast_severe_condition_72h: ha_bridge/forecast/severe_condition_72h

risk_thresholds:
  pressure_drop_1h_hpa_watch: -1.5
  pressure_drop_3h_hpa_watch: -3.0
  wind_gust_watch_kmh: 45
  wind_gust_warning_kmh: 65
  rain_rate_watch_mm_h: 4
  rain_rate_warning_mm_h: 10
  lightning_nearby_km: 25
  heat_humidex_mild: 30
  # ECCC heat warning criterion for New Brunswick: humidex >= 36.
  heat_humidex_warning: 36
  heat_humidex_severe: 40
  cold_wind_chill_mild_c: -10
  cold_wind_chill_moderate_c: -20
  cold_wind_chill_severe_c: -30

runtime:
  publish_interval_seconds: 300
  snapshot_history_limit: 2016
  write_snapshots_jsonl: true
  snapshot_path: /app/data/weather_snapshots.jsonl
  # Every published prediction is logged here so the verification harness
  # can score it against what actually happened (accuracy roadmap Phase 0).
  write_predictions_jsonl: true
  predictions_path: /app/data/predictions.jsonl
