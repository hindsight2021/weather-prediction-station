services:
  weather-brain:
    build: .
    container_name: kcr-weather-brain
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - weather-brain

  verifier:
    build: .
    container_name: kcr-weather-verifier
    command: python -m verification.runner
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    networks:
      - weather-brain

  console:
    build: .
    container_name: kcr-weather-console
    command: python -m console.app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8126:8126"
    volumes:
      - ./data:/app/data:ro
    networks:
      - weather-brain

  ha-bridge:
    build: .
    container_name: kcr-ha-bridge
    command: python -m app.ha_bridge
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - weather-brain

networks:
  weather-brain:
    driver: bridge
