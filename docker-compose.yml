services:
  weather-brain:
    build: .
    container_name: kcr-weather-brain
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - weather-brain

networks:
  weather-brain:
    driver: bridge
